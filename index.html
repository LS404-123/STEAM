<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix LED Designer | 5x5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-bg: #0f172a;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --led-off: #334155;
            --board-wood: #1e293b;
            /* Dark board for better glow visibility */
            --led-size: 32px;
            --grid-gap: 60px;
            --grid-size: 5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.85rem;
        }

        .main-container {
            display: grid;
            grid-template-columns: 550px 1fr;
            gap: 40px;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            width: 1000px;
            height: 600px;
            align-items: center;
        }

        /* LED Grid */
        .grid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .led-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), var(--led-size));
            grid-template-rows: repeat(var(--grid-size), var(--led-size));
            gap: var(--grid-gap);
            background: var(--board-wood);
            padding: 80px 40px 40px 40px;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            /* Adjusted clip-path to avoid cutting LEDs at larger scale */
            clip-path: polygon(0% 8%,
                    60% 8%,
                    60% 0%,
                    100% 0%,
                    100% 100%,
                    0% 100%);
            transition: all 0.3s ease;
        }

        .led-grid::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            z-index: -1;
        }

        .led {
            width: var(--led-size);
            height: var(--led-size);
            background-color: var(--led-off);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5), 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* LED leg holes decoration */
        .led::before,
        .led::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
        }

        .led::before {
            top: -12px;
        }

        .led::after {
            bottom: -12px;
        }

        .led.active {
            box-shadow:
                0 0 15px var(--glow-color),
                0 0 30px var(--glow-color),
                0 0 45px var(--glow-color),
                0 0 60px var(--glow-color);
            /* Extra layer for volume */
            background-color: var(--glow-color);
            z-index: 5;
            filter: brightness(1.2);
            /* Make it pop more */
        }



        .terminal-label {
            position: absolute;
            font-weight: bold;
            font-size: 14px;
            font-family: 'Orbitron', sans-serif;
        }

        .pos-label {
            color: #ff4444;
            left: 20px;
            bottom: 20px;
        }

        .neg-label {
            color: #888;
            right: 20px;
            bottom: 20px;
        }

        /* Control Panel */
        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
            justify-content: center;
            height: 100%;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .color-swatch {
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-swatch.selected {
            border-color: #fff;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .color-swatch.disabled {
            opacity: 0.2;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(1);
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent-color);
            border: none;
        }

        .btn-active {
            background: #10b981;
            border-color: #10b981;
        }

        .tool-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #111827;
            width: 95%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .close-btn {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .sample-library {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            overflow-y: auto;
            padding-right: 8px;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: var(--led-off) transparent;
        }

        .sample-library::-webkit-scrollbar {
            width: 6px;
        }

        .sample-library::-webkit-scrollbar-thumb {
            background-color: var(--led-off);
            border-radius: 10px;
        }

        .sample-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .sample-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
            border-color: #fff;
        }

        .sample-icon {
            width: 50px;
            height: 50px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .sample-pixel {
            border-radius: 1px;
            background: #333;
        }

        /* Library Tabs */
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .modal-tab {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .modal-tab:hover {
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .modal-tab.active {
            color: var(--accent-color);
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
        }

        @media (max-width: 650px) {
            .main-container {
                flex-direction: column;
                padding: 15px;
            }

            .led-grid {
                padding: 60px 30px 30px 30px;
                gap: 24px;
            }
        }
    </style>
</head>

        <section class="controls-section">

            </div>

            <div class="action-buttons">

                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    範例圖案庫
                </button>

                <div class="tool-row">
                    <button class="btn" id="eraserBtn">

                            <path d="m22 21-6 0" />
                        </svg>
                        橡皮
                    </button>
                    <button class="btn" id="clearBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                        清除

                <button class="btn btn-primary" id="gridToggleBtn">
                    切換至 10x10 網格
                </button>
            </div>
        </section>
    </div>

    <!-- Library Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">

                <div class="modal-tab" data-tab="cool">冷色系 (藍/綠)</div>
                <div class="modal-tab" data-tab="neutral">其他</div>
            </div>
            <div class="sample-library" id="sampleLibrary">
                <!-- Samples will be injected here -->
            </div>
        </div>
    </div>

                ]
            },
            { name: '清空', group: 'neutral', data: Array(25).fill(OFF) }
        ];



        // Modal Logic
        let currentTab = 'all';

        libraryBtn.addEventListener('click', () => {
            initLibrary();
            modalOverlay.style.display = 'flex';
            setTimeout(() => modalOverlay.classList.add('show'), 10);
        });

        modalTabs.addEventListener('click', (e) => {
            const tab = e.target.closest('.modal-tab');
            if (tab) {
                modalTabs.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                initLibrary();
            }
        });

        const closeFunc = () => {
            modalOverlay.classList.remove('show');
            setTimeout(() => modalOverlay.style.display = 'none', 300);
        };

        closeModal.addEventListener('click', closeFunc);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeFunc(); });

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            if (element && element.classList.contains('led')) {
                const index = parseInt(element.dataset.index);
                paintLED(index);
            }
        }

        function initGrid() {
            grid.querySelectorAll('.led').forEach(led => led.remove());
            const totalLEDs = currentGridSize * currentGridSize;
            for (let i = 0; i < totalLEDs; i++) {
                const led = document.createElement('div');
                led.className = 'led';
                led.dataset.index = i;
                led.addEventListener('mousedown', () => { isMouseDown = true; paintLED(i); });
                led.addEventListener('mouseenter', () => { if (isMouseDown) paintLED(i); });
                grid.appendChild(led);
            }
        }

        gridToggleBtn.addEventListener('click', () => {
            currentGridSize = currentGridSize === 5 ? 10 : 5;
            const root = document.documentElement;
            if (currentGridSize === 10) {
                root.style.setProperty('--grid-size', '10');
                root.style.setProperty('--led-size', '20px');
                root.style.setProperty('--grid-gap', '25px');
                gridToggleBtn.textContent = '切換至 5x5 網格';
            } else {
                root.style.setProperty('--grid-size', '5');
                root.style.setProperty('--led-size', '32px');
                root.style.setProperty('--grid-gap', '60px');
                gridToggleBtn.textContent = '切換至 10x10 網格';
            }
            clearAll();
            initGrid();
        });

        function initLibrary() {
            sampleLibrary.innerHTML = ''; // Clear previous
            SAMPLES.forEach((sample, idx) => {
                // Tab filter
                if (currentTab !== 'all' && sample.group !== currentTab) {
                    return;
                }
                const item = document.createElement('div');
                item.className = 'sample-item';
                item.innerHTML = `<div class="sample-icon">${sample.data.map(c => `<div class="sample-pixel" style="background:${c || '#333'}"></div>`).join('')}</div>`;
                item.addEventListener('click', () => { applySample(idx); closeFunc(); });
                sampleLibrary.appendChild(item);
            });
        }

        function applySample(index) {
            const sample = SAMPLES[index];
            const data = sample.data;

            if (sample.group !== 'neutral') {
                activeGroup = sample.group;
                updatePaletteStatus();
            }

            // Clear current grid first
            grid.querySelectorAll('.led').forEach(led => {
                led.classList.remove('active');
                led.style.backgroundColor = '';
                delete led.dataset.group;
            });

            const leds = grid.querySelectorAll('.led');
            if (currentGridSize === 5) {
                data.forEach((color, i) => {
                    if (color) {
                        const led = leds[i];
                        led.classList.add('active');
                        led.style.backgroundColor = color;
                        led.style.setProperty('--glow-color', color);
                        led.dataset.group = sample.group;
                    }
                });
            } else {
                // Center 5x5 on 10x10
                const offset = 2;
                data.forEach((color, i) => {
                    if (color) {
                        const r = Math.floor(i / 5) + offset;
                        const c = (i % 5) + offset;
                        const targetIdx = r * 10 + c;
                        const led = leds[targetIdx];
                        if (led) {
                            led.classList.add('active');
                            led.style.backgroundColor = color;
                            led.style.setProperty('--glow-color', color);
                            led.dataset.group = sample.group;
                        }
                    }
                });
            }
        }

        palette.addEventListener('click', (e) => {
            const swatch = e.target.closest('.color-swatch');
            if (swatch && !swatch.classList.contains('disabled')) {
                document.querySelector('.color-swatch.selected')?.classList.remove('selected');
                swatch.classList.add('selected');
                currentColor = swatch.dataset.color;
                isEraser = false;
                eraserBtn.classList.remove('btn-active');
            }
        });

        function updatePaletteStatus() {
            const swatches = document.querySelectorAll('.color-palette .color-swatch');
            swatches.forEach(swatch => {
                const group = swatch.dataset.group;
                if (activeGroup && group !== 'neutral' && group !== activeGroup) {
                    swatch.classList.add('disabled');
                } else {
                    swatch.classList.remove('disabled');
                }
            });
        }

        function paintLED(index) {
            const leds = grid.querySelectorAll('.led');
            const led = leds[index];
            if (isEraser) {
                led.classList.remove('active');
                led.style.backgroundColor = '';
                checkActiveGroup();
            } else {
                const selectedSwatch = document.querySelector('.color-swatch.selected');
                const group = selectedSwatch?.dataset.group;

                if (group && group !== 'neutral') {
                    activeGroup = group;
                    updatePaletteStatus();
                }

                led.classList.add('active');
                led.style.backgroundColor = currentColor;
                led.style.setProperty('--glow-color', currentColor);
                led.dataset.group = group;
            }
        }

        function checkActiveGroup() {
            const activeLeds = Array.from(grid.querySelectorAll('.led.active'));
            const groups = activeLeds.map(l => l.dataset.group).filter(g => g && g !== 'neutral');
            if (groups.length === 0) {
                activeGroup = null;
            } else {
                activeGroup = groups[0];
            }
            updatePaletteStatus();
        }

        eraserBtn.addEventListener('click', () => {
            isEraser = !isEraser;
            eraserBtn.classList.toggle('btn-active', isEraser);
        });

        function clearAll() {
            Array.from(grid.querySelectorAll('.led')).forEach(led => {
                led.classList.remove('active');
                led.style.backgroundColor = '';
                led.style.setProperty('--glow-color', 'transparent');
                delete led.dataset.group;
            });
            activeGroup = null;
            updatePaletteStatus();
        }

        clearBtn.addEventListener('click', clearAll);

        grid.addEventListener('contextmenu', e => e.preventDefault());

        // Touch events
        grid.addEventListener('touchstart', (e) => {
            isMouseDown = true;
            handleTouch(e);
        }, { passive: false });

        grid.addEventListener('touchmove', (e) => {
            if (isMouseDown) handleTouch(e);
        }, { passive: false });

        grid.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        initGrid();
        initLibrary();
    </script>
</body>

</html>
