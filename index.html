<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 LED 矩陣接線教學</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.6);
            --accent-color: #0ea5e9;
            --text-color: #0f172a;
            --secondary-text: #64748b;
            --anode-color: #ef4444; 
            --cathode-color: #2563eb;
            --led-off: #cbd5e1;
            --wire-color: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(-45deg, #e0f2fe, #f0f9ff, #dbeafe, #f1f5f9);
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 1.5rem;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 1100px;
            height: 650px;
            padding: 0.75rem 2rem 1rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 1.75rem;
            margin: 0.25rem 0 0.5rem 0;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #0ea5e9, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #canvas-container {
            width: 450px;
            max-width: 950px;
            height: 450px;
            margin: 0 auto 0.5rem;
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.5s ease;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .step-info {
            min-height: 90px;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .step-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #0369a1;
        }

        .step-desc {
            font-size: 1.05rem;
            color: var(--secondary-text);
            line-height: 1.5;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        button {
            padding: 0.8rem 2rem;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-prev {
            background: #cbd5e1;
            color: #475569;
        }

        .btn-next {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Animation Styles */
        .wire {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 1s ease-in-out;
            stroke-linecap: round;
        }

        .wire.active {
            stroke-dashoffset: 0;
        }

        .led {
            transition: fill 0.5s ease;
        }

        .led.highlight {
            filter: drop-shadow(0 0 12px var(--accent-color));
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 99px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        #progress-inner {
            height: 100%;
            background: linear-gradient(to right, #0ea5e9, #6366f1);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flow-path {
            stroke-dasharray: 6, 12;
            stroke-width: 3;
            fill: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .flow-active {
            opacity: 1 !important;
            animation: dash 0.8s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -18; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>3x3 LED 矩陣接線教學</h1>
    
    <div class="progress-bar">
        <div id="progress-inner"></div>
    </div>

    <div id="canvas-container">
        <svg id="svg" viewBox="0 0 300 300">
            <!-- Wood Board Grid -->
            <rect x="25" y="25" width="250" height="250" rx="10" fill="#2d2d2d" stroke="#1a1a1a" />
            
            <!-- All wires in a group for state management -->
            <g id="wires-layer">
                <!-- Rows Anode Wires (Positive - Red) -->
                <path id="row-0" class="wire" d="M 50 55 H 235" stroke="#ef4444" stroke-width="3" fill="none" opacity="0.6" />
                <path id="row-1" class="wire" d="M 50 130 H 235" stroke="#ef4444" stroke-width="3" fill="none" opacity="0.6" />
                <path id="row-2" class="wire" d="M 50 205 H 235" stroke="#ef4444" stroke-width="3" fill="none" opacity="0.6" />

                <!-- Rows Cathode Wires (Negative - Blue) -->
                <path id="col-0" class="wire" d="M 65 90 H 265" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.6" />
                <path id="col-1" class="wire" d="M 65 165 H 265" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.6" />
                <path id="col-2" class="wire" d="M 65 240 H 265" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.6" />

                <!-- Bus Bars (Vertical aggregation) -->
                <path id="red-bus" class="wire" d="M 50 55 V 280" stroke="#ef4444" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round" />
                <path id="blue-bus" class="wire" d="M 265 90 V 280" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round" />
            </g>

            <!-- Polarity Labels -->
            <text x="50" y="295" font-family="Arial" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">+</text>
            <text x="265" y="295" font-family="Arial" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">−</text>

            <!-- LEDs with Legs (Long: 40, Short: 24) -->
            <g id="led-grid">
                <!-- Row 0 -->
                <g class="led-group" transform="translate(75, 75)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <g class="led-group" transform="translate(150, 75)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <g class="led-group" transform="translate(225, 75)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <!-- Row 1 -->
                <g class="led-group" transform="translate(75, 150)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <g class="led-group" transform="translate(150, 150)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <g class="led-group" transform="translate(225, 150)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <!-- Row 2 -->
                <g class="led-group" transform="translate(75, 225)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <g class="led-group" transform="translate(150, 225)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
                <g class="led-group" transform="translate(225, 225)">
                    <path class="leg-short" d="M -3,0 V 24" stroke="#94a3b8" stroke-width="1.5" fill="none" />
                    <path class="leg-long" d="M 3,0 V 40" stroke="#cbd5e1" stroke-width="1.5" fill="none" />
                    <circle r="8" fill="#475569" class="led" />
                </g>
            </g>

            <!-- Warnings/Highlights (Positions for row-to-row gap safety) -->
            <!-- Spot 1: Gap between Row 0 Blue and Row 1 Red -->
            <circle id="warning-1" cx="150" cy="110" r="15" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0" stroke-dasharray="3,3" />
            <!-- Spot 2: Gap between Row 1 Blue and Row 2 Red -->
            <circle id="warning-2" cx="150" cy="185" r="15" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0" stroke-dasharray="3,3" />

            <!-- Flow Paths (Current Visualization) -->
            <g id="flow-layer">
                <!-- Positive Bus Flow -->
                <path class="flow-path" d="M 50,280 V 55" stroke="#fef08a" />
                
                <!-- Row 0: Flow through LEDs -->
                <path class="flow-path" d="M 50,55 H 228" stroke="#fef08a" />
                <path class="flow-path" d="M 78,55 V 75" stroke="#fef08a" />
                <path class="flow-path" d="M 72,75 V 90" stroke="#fef08a" />
                <path class="flow-path" d="M 153,55 V 75" stroke="#fef08a" />
                <path class="flow-path" d="M 147,75 V 90" stroke="#fef08a" />
                <path class="flow-path" d="M 228,55 V 75" stroke="#fef08a" />
                <path class="flow-path" d="M 222,75 V 90" stroke="#fef08a" />
                <path class="flow-path" d="M 65,90 H 265" stroke="#60a5fa" />

                <!-- Row 1: Flow through LEDs -->
                <path class="flow-path" d="M 50,130 H 228" stroke="#fef08a" />
                <path class="flow-path" d="M 78,130 V 150" stroke="#fef08a" />
                <path class="flow-path" d="M 72,150 V 165" stroke="#fef08a" />
                <path class="flow-path" d="M 153,130 V 150" stroke="#fef08a" />
                <path class="flow-path" d="M 147,150 V 165" stroke="#fef08a" />
                <path class="flow-path" d="M 228,130 V 150" stroke="#fef08a" />
                <path class="flow-path" d="M 222,150 V 165" stroke="#fef08a" />
                <path class="flow-path" d="M 65,165 H 265" stroke="#60a5fa" />

                <!-- Row 2: Flow through LEDs -->
                <path class="flow-path" d="M 50,205 H 228" stroke="#fef08a" />
                <path class="flow-path" d="M 78,205 V 225" stroke="#fef08a" />
                <path class="flow-path" d="M 72,225 V 240" stroke="#fef08a" />
                <path class="flow-path" d="M 153,205 V 225" stroke="#fef08a" />
                <path class="flow-path" d="M 147,225 V 240" stroke="#fef08a" />
                <path class="flow-path" d="M 228,205 V 225" stroke="#fef08a" />
                <path class="flow-path" d="M 222,225 V 240" stroke="#fef08a" />
                <path class="flow-path" d="M 65,240 H 265" stroke="#60a5fa" />

                <!-- Negative Bus Flow (Return) -->
                <path class="flow-path" d="M 265,90 V 270" stroke="#60a5fa" />
            </g>
        </svg>
    </div>

    <div class="step-info">
        <div id="step-title" class="step-title">準備工作</div>
        <div id="step-desc" class="step-desc">準備一塊 3x3 網格樣板，將 LED 的長腳（正極）朝向同一個方向。</div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="btn-prev" disabled>上一步</button>
        <button id="nextBtn" class="btn-next">開始教學</button>
    </div>
</div>

<script>
    const steps = [
        {
            title: "1. 準備組件",
            desc: "將 9 顆 LED 放入樣板並確認長腳方向一致。導線準備從左右兩側引出。",
            action: () => {
                resetAll();
                bendLegs(null, 'long', false);
                bendLegs(null, 'short', false);
            }
        },
        {
            title: "2. 折彎正極腳",
            desc: "將第一排 LED 的長腳垂直往上折。保持針腳筆直，指向紅線預定位置。",
            action: () => {
                resetAll();
                bendLegs(0, 'long', true);
            }
        },
        {
            title: "3. 焊接正極線",
            desc: "將紅色導線水平焊接在第一排正極上。導線位置距 LED 中心約 20 單位。",
            action: () => {
                resetAll();
                bendLegs(0, 'long', true);
                showRow(0, true);
            }
        },
        {
            title: "4. 完成正極焊接",
            desc: "依序將其餘兩排的長腳往上折，並完成水平紅線的焊接與固定。",
            action: () => {
                resetAll();
                [0,1,2].forEach(i => bendLegs(i, 'long', true));
                showRows(true);
            }
        },
        {
            title: "5. 修剪多餘針腳",
            desc: "剪掉焊接點上方多餘的長腳。動畫中可看到針腳縮短，確保電路整潔不短路。",
            action: () => {
                resetAll();
                [0,1,2].forEach(i => bendLegs(i, 'long', 'trim'));
                showRows(true);
            }
        },
        {
            title: "6. 焊接負極線",
            desc: "將藍色導線水平與各排短腳焊接。藍線位置距中心約 15 單位，由右側引出。",
            action: () => {
                resetAll();
                bendLegs(null, 'long', 'trim');
                bendLegs(null, 'short', true);
                showRows(true);
                showCols(true);
            }
        },
        {
            title: "7. 安裝總線",
            desc: "在左側用垂直紅線連接三排正極，右側則連接三排負極。總線延伸至板底以便連線。",
            action: () => {
                resetAll();
                bendLegs(null, 'long', 'trim');
                bendLegs(null, 'short', 'trim');
                showRows(true);
                showCols(true);
                toggleBuses(true);
            }
        },
        {
            title: "8. 安全檢查",
            desc: "仔細觀察圖中標示處：1. 上下兩排導線間的絕緣間隙（垂直間距）。2. 嚴防正負極線意外接觸。確保電路安全。",
            action: () => {
                resetAll();
                bendLegs(null, 'long', 'trim');
                bendLegs(null, 'short', 'trim');
                showRows(true);
                showCols(true);
                toggleBuses(true);
                highlightWarning(true);
            }
        },
        {
            title: "9. 並聯原理：電流流向",
            desc: "看電流（黃光）如何分流至 3 條路徑，再匯集回負極。這就是並聯電路！",
            action: () => {
                resetAll();
                bendLegs(null, 'long', 'trim');
                bendLegs(null, 'short', 'trim');
                showRows(true);
                showCols(true);
                toggleBuses(true);
                allLEDsGlow(true);
                toggleFlow(true);
            }
        },
        {
            title: "10. 5x5 挑戰模式 (延伸範例)",
            desc: "看看更複雜的 5x5 矩陣佈線！25 顆 LED 的並聯邏輯與 3x3 完全相同，但規模更壯觀。",
            action: () => {
                render5x5Challenge();
            }
        }
    ];

    let currentStep = 0;
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const stepTitle = document.getElementById('step-title');
    const stepDesc = document.getElementById('step-desc');
    const progressInner = document.getElementById('progress-inner');

    function resetAll() {
        // Reset container and viewBox
        const container = document.getElementById('canvas-container');
        const svg = document.getElementById('svg');
        container.style.width = '450px';
        svg.setAttribute('viewBox', '0 0 300 300');

        document.getElementById('led-grid').innerHTML = document.getElementById('led-grid').dataset.original || document.getElementById('led-grid').innerHTML;
        const wiresLayer = document.getElementById('wires-layer');
        if(wiresLayer && wiresLayer.dataset.original) wiresLayer.innerHTML = wiresLayer.dataset.original;
        const flowLayer = document.getElementById('flow-layer');
        if(flowLayer && flowLayer.dataset.original) flowLayer.innerHTML = flowLayer.dataset.original;
        else if(flowLayer) flowLayer.innerHTML = '';
        
        document.querySelectorAll('.wire').forEach(w => w.classList.remove('active'));
        document.querySelectorAll('.led').forEach(l => {
            l.style.fill = '#475569';
            l.classList.remove('highlight');
        });
        const w1 = document.getElementById('warning-1');
        const w2 = document.getElementById('warning-2');
        if (w1) w1.setAttribute('opacity', '0');
        if (w2) w2.setAttribute('opacity', '0');
        toggleFlow(false);
    }

    // Save originals for reset
    document.getElementById('led-grid').dataset.original = document.getElementById('led-grid').innerHTML;
    document.getElementById('wires-layer').dataset.original = document.getElementById('wires-layer').innerHTML;
    document.getElementById('flow-layer').dataset.original = document.getElementById('flow-layer').innerHTML;

    function render5x5Challenge() {
        const container = document.getElementById('canvas-container');
        const svg = document.getElementById('svg');
        const ledGrid = document.getElementById('led-grid');
        const wiresLayer = document.getElementById('wires-layer');
        const flowLayer = document.getElementById('flow-layer');

        // Expand view for two boards
        container.style.width = '900px';
        svg.setAttribute('viewBox', '0 0 600 350');

        ledGrid.innerHTML = '';
        wiresLayer.innerHTML = '';
        flowLayer.innerHTML = '';

        // Labels
        const labelStyle = 'font-family: Arial; font-size: 10px; font-weight: bold; fill: #6366f1;';
        wiresLayer.innerHTML += `<text x="150" y="20" style="${labelStyle}" text-anchor="middle">方法一：標準並聯佈線 (10 條線)</text>`;
        wiresLayer.innerHTML += `<text x="450" y="20" style="${labelStyle}" text-anchor="middle">方法二：鏡像共用導線法 (僅 6 條線！)</text>`;

        const LED_X = [55, 100, 145, 190, 235];
        const LED_Y = [55, 100, 145, 190, 235];

        const renderBoard = (offsetX, type) => {
            // Wood Board
            wiresLayer.innerHTML += `<rect x="${25+offsetX}" y="25" width="250" height="250" rx="10" fill="#2d2d2d" stroke="#1a1a1a" />`;
            
            // Polarities
            wiresLayer.innerHTML += `<text x="${50+offsetX}" y="295" font-family="Arial" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">+</text>`;
            wiresLayer.innerHTML += `<text x="${265+offsetX}" y="295" font-family="Arial" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">−</text>`;

            if (type === 'horiz') {
                const ANODE_Y = [37, 82, 127, 172, 217];
                const CATHODE_Y = [67, 112, 157, 202, 247];

                LED_Y.forEach((y, rIdx) => {
                    LED_X.forEach((x, cIdx) => {
                        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                        g.setAttribute("class", "led-group");
                        g.setAttribute("transform", `translate(${x+offsetX}, ${y})`);
                        g.innerHTML = `<path class="leg-short" d="M -3,0 V 12" stroke="#3b82f6" stroke-width="1.2" fill="none" /><path class="leg-long" d="M 3,0 V -18" stroke="#ef4444" stroke-width="1.2" fill="none" /><circle r="6" fill="#fbbf24" class="led highlight" />`;
                        ledGrid.appendChild(g);
                    });
                });

                ANODE_Y.forEach((y, r) => {
                    wiresLayer.innerHTML += `<path class="wire active" d="M ${40+offsetX} ${y} H ${238+offsetX}" stroke="#ef4444" stroke-width="2.5" fill="none" />`;
                    wiresLayer.innerHTML += `<path class="wire active" d="M ${52+offsetX} ${CATHODE_Y[r]} H ${260+offsetX}" stroke="#3b82f6" stroke-width="2.5" fill="none" />`;
                });
                wiresLayer.innerHTML += `<path class="wire active" d="M ${40+offsetX} 37 V 285" stroke="#ef4444" stroke-width="3" fill="none" stroke-linecap="round" />`;
                wiresLayer.innerHTML += `<path class="wire active" d="M ${260+offsetX} 67 V 285" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" />`;

                // Flow
                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${40+offsetX},285 V 37" stroke="#fef08a" />`;
                ANODE_Y.forEach((y, r) => {
                    flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${40+offsetX},${y} H ${238+offsetX}" stroke="#fef08a" />`;
                    const currentY = LED_Y[r];
                    LED_X.forEach(x => {
                        // Current into LED (Pos Rail down to LED center)
                        flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX+3},${y} V ${currentY}" stroke="#fef08a" />`;
                        // Current out of LED (LED center down to Neg Rail)
                        flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX-3},${currentY} V ${CATHODE_Y[r]}" stroke="#fef08a" />`;
                    });
                    flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${55+offsetX},${CATHODE_Y[r]} H ${260+offsetX}" stroke="#fef08a" />`;
                });
                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${260+offsetX},67 V 285" stroke="#fef08a" />`;
            } else {
                // Shared Rail Method (Positive-Negative-Negative-Positive mirroring)
                const RAIL_Y = [37, 77.5, 122.5, 167.5, 212.5, 252.5];
                const RAIL_TYPES = ['pos', 'neg', 'pos', 'neg', 'pos', 'neg']; // Shared cables

                LED_Y.forEach((y, rIdx) => {
                    const isMirrored = rIdx % 2 !== 0; // Row 2, 4 are mirrored
                    LED_X.forEach((x, cIdx) => {
                        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                        g.setAttribute("class", "led-group");
                        g.setAttribute("transform", `translate(${x+offsetX}, ${y})`);
                        
                        if (!isMirrored) {
                            // Row 1, 3, 5: Anode UP, Cathode DOWN
                            g.innerHTML = `<path class="leg-long" d="M 3,0 V ${RAIL_Y[rIdx] - y}" stroke="#ef4444" stroke-width="1.2" fill="none" /><path class="leg-short" d="M -3,0 V ${RAIL_Y[rIdx+1] - y}" stroke="#3b82f6" stroke-width="1.2" fill="none" /><circle r="6" fill="#fbbf24" class="led highlight" />`;
                        } else {
                            // Row 2, 4: Cathode UP, Anode DOWN (Mirror)
                            g.innerHTML = `<path class="leg-short" d="M -3,0 V ${RAIL_Y[rIdx] - y}" stroke="#3b82f6" stroke-width="1.2" fill="none" /><path class="leg-long" d="M 3,0 V ${RAIL_Y[rIdx+1] - y}" stroke="#ef4444" stroke-width="1.2" fill="none" /><circle r="6" fill="#fbbf24" class="led highlight" />`;
                        }
                        ledGrid.appendChild(g);
                    });
                });

                RAIL_Y.forEach((y, r) => {
                    const isPos = RAIL_TYPES[r] === 'pos';
                    const color = isPos ? '#ef4444' : '#3b82f6';
                    const startX = isPos ? 40+offsetX : 55+offsetX-10; 
                    const endX = isPos ? 240+offsetX+10 : 260+offsetX;
                    wiresLayer.innerHTML += `<path class="wire active" d="M ${startX} ${y} H ${endX}" stroke="${color}" stroke-width="2.5" fill="none" />`;
                });

                // Vertical main buses
                wiresLayer.innerHTML += `<path class="wire active" d="M ${40+offsetX} 37 V 285" stroke="#ef4444" stroke-width="3" fill="none" stroke-linecap="round" />`;
                wiresLayer.innerHTML += `<path class="wire active" d="M ${260+offsetX} 77.5 V 285" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" />`;
                
                // Jumper wires (Reinforcing connections to vertical distribution buses)
                wiresLayer.innerHTML += `<path class="wire active" d="M ${40+offsetX} 122.5 H ${35+offsetX}" stroke="#ef4444" stroke-width="2.5" />`; 
                wiresLayer.innerHTML += `<path class="wire active" d="M ${260+offsetX} 167.5 H ${265+offsetX}" stroke="#3b82f6" stroke-width="2.5" />`; 
                wiresLayer.innerHTML += `<path class="wire active" d="M ${40+offsetX} 212.5 H ${35+offsetX}" stroke="#ef4444" stroke-width="2.5" />`;
                wiresLayer.innerHTML += `<path class="wire active" d="M ${260+offsetX} 252.5 H ${265+offsetX}" stroke="#3b82f6" stroke-width="2.5" />`;

                // Flow
                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${40+offsetX},285 V 37" stroke="#fef08a" />`;
                RAIL_Y.forEach((y, r) => {
                    if (RAIL_TYPES[r] === 'pos') {
                        flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${40+offsetX},${y} H ${240+offsetX}" stroke="#fef08a" />`;
                        LED_X.forEach(x => {
                            if (r === 0) flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX+3},${y} V 55" stroke="#fef08a" />`;
                            else if (r === 2) {
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX+3},${y} V 100" stroke="#fef08a" />`;
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX+3},${y} V 145" stroke="#fef08a" />`;
                            } else if (r === 4) {
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX+3},${y} V 190" stroke="#fef08a" />`;
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX+3},${y} V 235" stroke="#fef08a" />`;
                            }
                        });
                    } else {
                        flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${240+offsetX},${y} H ${260+offsetX}" stroke="#fef08a" />`;
                        LED_X.forEach(x => {
                            if (r === 1) {
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX-3},55 V ${y}" stroke="#fef08a" />`;
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX-3},100 V ${y}" stroke="#fef08a" />`;
                            } else if (r === 3) {
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX-3},145 V ${y}" stroke="#fef08a" />`;
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX-3},190 V ${y}" stroke="#fef08a" />`;
                            } else if (r === 5) {
                                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${x+offsetX-3},235 V ${y}" stroke="#fef08a" />`;
                            }
                        });
                        flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${55+offsetX},${y} H ${260+offsetX}" stroke="#fef08a" />`;
                    }
                });
                flowLayer.innerHTML += `<path class="flow-path flow-active" d="M ${260+offsetX},77.5 V 285" stroke="#fef08a" />`;
            }
        };

        renderBoard(0, 'horiz');
        renderBoard(300, 'rail');
    }

    function toggleFlow(active) {
        document.querySelectorAll('.flow-path').forEach(p => {
            if(active) p.classList.add('flow-active');
            else p.classList.remove('flow-active');
        });
    }

    function updateStep() {
        if (!steps[currentStep]) return;
        const step = steps[currentStep];
        console.log(`Updating to step ${currentStep}: ${step.title}`);
        stepTitle.innerText = step.title;
        stepDesc.innerText = step.desc;
        
        try {
            step.action();
        } catch (e) {
            console.error("Action Error:", e);
        }

        nextBtn.innerText = currentStep === steps.length - 1 ? "重新開始" : (currentStep === 0 ? "開始教學" : "下一步");
        nextBtn.className = currentStep === steps.length - 1 ? "btn-prev" : "btn-next";
        prevBtn.disabled = currentStep === 0;
        
        progressInner.style.width = `${(currentStep / (steps.length - 1)) * 100}%`;
    }

    // Safe helper to toggle element class
    function toggleClass(id, className, add) {
        const el = document.getElementById(id);
        if (el) {
            if (add) el.classList.add(className);
            else el.classList.remove(className);
        }
    }

    function bendLegs(rowIdx, type, state) {
        const groups = document.querySelectorAll('.led-group');
        groups.forEach((g, i) => {
            const itemsPerRow = groups.length === 25 ? 5 : 3;
            const currentRow = Math.floor(i / itemsPerRow);
            if (rowIdx === null || rowIdx === currentRow) {
                const leg = g.querySelector(`.leg-${type}`);
                if (!leg) return;
                
                if (state === true) {
                    if (type === 'long') {
                        leg.setAttribute('d', groups.length === 25 ? 'M 3,0 V -18' : 'M 3,0 V -40');
                        leg.setAttribute('stroke', '#ef4444');
                    } else {
                        leg.setAttribute('d', groups.length === 25 ? 'M -3,0 V 12' : 'M -3,0 V 24');
                        leg.setAttribute('stroke', '#3b82f6');
                    }
                } else if (state === 'trim') {
                    if (type === 'long') {
                        leg.setAttribute('d', groups.length === 25 ? 'M 3,0 V -18' : 'M 3,0 V -20');
                    } else {
                        leg.setAttribute('d', groups.length === 25 ? 'M -3,0 V 12' : 'M -3,0 V 15');
                    }
                } else {
                    leg.setAttribute('d', type === 'long' ? 'M 3,0 V 40' : 'M -3,0 V 24');
                    leg.setAttribute('stroke', type === 'long' ? '#cbd5e1' : '#94a3b8');
                }
            }
        });
    }

    function showRow(idx, active) {
        const row = document.getElementById(`row-${idx}`);
        if(row && active) row.classList.add('active');
        else if(row) row.classList.remove('active');
    }

    function showRows(show) {
        [0, 1, 2].forEach(i => showRow(i, show));
    }

    function showCols(show) {
        ['col-0', 'col-1', 'col-2'].forEach(id => {
            const el = document.getElementById(id);
            if(el && show) el.classList.add('active');
            else if(el) el.classList.remove('active');
        });
    }

    function toggleBuses(show) {
        const rb = document.getElementById('red-bus');
        const bb = document.getElementById('blue-bus');
        if(show) {
            rb.classList.add('active');
            bb.classList.add('active');
        } else {
            rb.classList.remove('active');
            bb.classList.remove('active');
        }
    }

    function highlightWarning(show) {
        const w1 = document.getElementById('warning-1');
        const w2 = document.getElementById('warning-2');
        if (w1) w1.setAttribute('opacity', show ? '1' : '0');
        if (w2) w2.setAttribute('opacity', show ? '1' : '0');
    }

    function allLEDsGlow(active) {
        document.querySelectorAll('.led').forEach(l => {
            l.style.fill = active ? '#fbbf24' : '#475569';
            if(active) l.classList.add('highlight');
        });
    }

    nextBtn.addEventListener('click', () => {
        if (currentStep === steps.length - 1) {
            currentStep = 0;
        } else {
            currentStep++;
        }
        updateStep();
    });

    prevBtn.addEventListener('click', () => {
        if (currentStep > 0) {
            currentStep--;
            updateStep();
        }
    });

    updateStep();
</script>

</body>
</html>
